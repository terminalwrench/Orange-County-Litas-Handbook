theme:
  name: material
  language: en
  logo: 03-Media/Assets/Logos/TheLitasOC-WhiteFill.png
  favicon: 03-Media/Assets/Logos/TheLitasOC-WhiteFill.png
  palette:
    - scheme: default
      primary: black
      accent: orange
  features:
    - navigation.instant
    - navigation.path
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Operations:

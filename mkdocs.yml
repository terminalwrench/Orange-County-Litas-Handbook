site_name: Orange County Litas Portal
site_description: A friendly website for the Orange County Litas chapter handbook.
repo_url: https://github.com/terminalwrench/Orange-County-Litas-Handbook
repo_name: terminalwrench/Orange-County-Litas-Handbook
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: black
      accent: orange
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

